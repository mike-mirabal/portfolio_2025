<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mike Mirabal</title>
  <!-- link to your CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Mike Mirabal</h1>

  <main>

      <button class="filter-btn active" data-category="All">All</button>
      <button class="filter-btn" data-category="AI Art">AI Art</button>
      <button class="filter-btn" data-category="Brand Design">Brand Design</button>
      <button class="filter-btn" data-category="Social">Social</button>
      <button class="filter-btn" data-category="Strategy">Strategy</button>
      <button class="filter-btn" data-category="UX">UX</button>
      <button class="filter-btn" data-category="Web">Web</button>
      <button class="filter-btn" data-category="XR">XR</button>
    </nav>

    <!-- Projects will be populated here by project.js -->
    <div id="projects-container"></div>
  </main>

  <footer>
    <div class="social-links">
      <a href="https://linkedin.com/in/your-profile" target="_blank" rel="noopener">LinkedIn</a> |
      <a href="mailto:youremail@example.com">Email</a>
    </div>
    <p>© Mike Mirabal 2025</p>
  </footer>

  <!-- PapaParse for CSV parsing -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <!-- Your project.js script -->
  <script src="project.js"></script>

</html>
