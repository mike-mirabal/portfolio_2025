<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Page - Mike Mirabal</title>
  
  <link rel="stylesheet" href="styles.css" />

  <script defer src="scripts/project.js"></script>

  <!-- Begin comment out Inline CSS. Instead Link to styles.css.
  
  <style>
    :root {
      --bg: #ffffff;
      --text: #1c1c1c;
      --accent: #3e7bfa;
      --muted: #6c6c6c;
      --tag-bg: #f0f0f0;
      --selected-border: #3e7bfa;
      --hover-border: #3e7bfa66;
    }

    [data-theme="dark"] {
      --bg: #1c1c1c;
      --text: #ffffff;
      --accent: #3e7bfa;
      --muted: #bbbbbb;
      --tag-bg: #333333;
      --selected-border: #3e7bfa;
      --hover-border: #3e7bfa66;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .theme-switch {
      width: 40px;
      height: 20px;
      background: var(--muted);
      border-radius: 10px;
      position: relative;
      cursor: pointer;
    }

    .theme-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: var(--bg);
      border-radius: 50%;
      transition: transform 0.3s ease;
    }

    [data-theme="dark"] .theme-switch::after {
      transform: translateX(20px);
    }

    .main-container {
      max-width: 900px;
      margin: 0 auto;
    }

    .icon-tags {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .tags span {
      font-size: 0.75rem;
      color: var(--text);
      background: var(--tag-bg);
      border-radius: 0.25rem;
      padding: 0.2rem 0.5rem;
      border: 1px solid var(--muted);
      margin-left: 0.25rem;
    }

    .meta {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .subnav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin: 1.5rem 0;
    }

    .subnav button,
    .subnav-button {
      padding: 0.5rem 1rem;
      border: 2px solid var(--accent);
      border-radius: 0.5rem;
      background: none;
      color: var(--accent);
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .subnav-button {
      display: inline-block;
      margin-top: 1rem;
    }

    .subnav-button:hover,
    .subnav button:hover {
      background: var(--hover-border);
    }

    figure {
      margin: 2rem 0;
    }

    figcaption {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin: 2rem 0;
    }

    @media (max-width: 768px) {
      .image-grid {
        grid-template-columns: 1fr;
      }

      .subnav,
      .subnav-button {
        width: 100%;
      }
    }

    footer {
      margin-top: 4rem;
      font-size: 0.875rem;
      text-align: center;
      color: var(--muted);
    }

    footer hr {
      margin: 2rem auto 1.5rem;
      width: 100%;
      border: none;
      border-top: 1px solid var(--muted);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
      margin: 0 0.5rem;
      display: inline-block;
    }

    .footer-bottom {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
</style>
  
  End comment out inline css -->


</head>
<body>
  <div class="header">
    <h1>Mike Mirabal</h1>
    <div class="theme-switch" onclick="toggleTheme()"></div>
  </div>

  <div class="main-container">
    
  <!-- ====== THIS CONTENT BELOW SHOULD POPULATE DYNAMICALLY FROM THE CMS (GOOGLE SHEET) USING THE JS SCRIPT  ====== -->
    
    <div class="icon-tags">
      <img id="project-icon" src="" alt="Project Icon" style="width:48px;height:48px;">
      <div class="tags" id="project-tags"></div>
    </div>

    <h2 id="project-title"></h2>
    <div class="meta" id="project-meta"></div>

    <div class="subnav">
      <button onclick="document.getElementById('problem').scrollIntoView({ behavior: 'smooth' })">Problem</button>
      <button onclick="document.getElementById('process').scrollIntoView({ behavior: 'smooth' })">Process</button>
      <button onclick="document.getElementById('solution').scrollIntoView({ behavior: 'smooth' })">Solution</button>
      <button onclick="document.getElementById('results').scrollIntoView({ behavior: 'smooth' })">Results</button>
    </div>

    <div class="content">
      <figure style="margin-top: 3rem;">
        <img id="hero-img" src="" alt="Project hero image">
        <figcaption id="hero-caption"></figcaption>
      </figure>

      <h3 id="problem" class="section-title" style="margin-top: 3rem;">Problem</h3>
      <p id="problem-copy"></p>

      <h3 id="process" class="section-title">Process</h3>
      <p id="process-copy"></p>

      <div class="image-grid">
        <figure>
          <img id="process-img-1" src="" alt="Process image 1">
          <figcaption id="process-caption-1"></figcaption>
        </figure>
        <figure>
          <img id="process-img-2" src="" alt="Process image 2">
          <figcaption id="process-caption-2"></figcaption>
        </figure>
      </div>

      <h3 id="solution" class="section-title">Solution</h3>
      <p id="solution-copy"></p>

      <h3 id="results" class="section-title">Results</h3>
      <p id="results-copy"></p>

      <figure>
        <img id="outcome-img" src="" alt="Outcome image">
        <figcaption id="outcome-caption"></figcaption>
      </figure>

      <div class="scroll-nav">
        <a href="#top">Return to top</a>
        <a href="index.html"><button class="subnav-button">← View All Projects</button></a>
      </div>
    </div>
  </div>

  <footer>
    <hr>
    <a href="https://linkedin.com/in/mikemirabal" target="_blank">LinkedIn</a>
    <a href="mailto:mikemirabal.ux@gmail.com">Email</a>
    <div class="footer-bottom">© Mike Mirabal 2025</div>
  </footer>

  <script>
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }
  </script>
</body>
</html>
