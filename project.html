<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Page – Mike Mirabal</title>
  <link rel="stylesheet" href="styles/project.css" />
</head>
<body>
  <!-- ====== HEADER (matches index.html) ====== -->
  <div class="header">
    <h1>Mike Mirabal</h1>
    <div class="theme-switch" onclick="toggleTheme()"></div>
  </div>

  <!-- ====== DYNAMIC PROJECT DETAIL ====== -->
  <div id="project-detail" class="main-container">
    <!-- project.js will inject:
         - icon & tags
         - title & meta (company | year)
         - hero image + caption
         - Problem / Process / Solution / Results sections
    -->
  </div>

  <!-- ====== FOOTER ====== -->
  <footer>
    <hr>
    <a href="https://linkedin.com/in/mikemirabal" target="_blank">LinkedIn</a>
    <a href="mailto:mikemirabal.ux@gmail.com">Email</a>
    <div class="footer-bottom">© Mike Mirabal 2025</div>
  </footer>

  <!-- ====== SCRIPTS ====== -->
  <script>
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }
  </script>
  <!-- PapaParse for CSV parsing -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <!-- Project loader script (ensure this matches your deployed path) -->
  <script src="project.js"></script>
</body>
</html>
