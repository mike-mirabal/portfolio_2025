<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Page – Mike Mirabal</title>
  <!-- Load index styles for consistent header spacing -->

</head>
<body>
  <!-- ====== HEADER ====== -->
  <div class="header">
    <h1><a href="index.html" style="color: inherit; text-decoration: none;">Mike Mirabal</a></h1>
    <div class="theme-switch" onclick="toggleTheme()"></div>

  <!-- ====== PROJECT DETAIL CONTAINER ====== -->

  <!-- ====== FOOTER ====== -->

  </footer>

  <!-- ====== SCRIPTS ====== -->
  <script>
    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="project.js"></script>
